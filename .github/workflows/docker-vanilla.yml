name: Build and Push Vanilla Fallback Image

# Triggered manually when PaperMC/Geyser haven't updated for a new MC version yet.
# Enter the exact Minecraft version string (e.g. 1.21.5) to build the fallback image.

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
    inputs:
      mc_version:
        description: 'Minecraft version (e.g. 1.21.5)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download vanilla server JAR
        run: |
          MC_VERSION="${{ inputs.mc_version }}"
          MANIFEST=$(curl -fsSL "https://piston-meta.mojang.com/mc/game/version_manifest_v2.json")
          VERSION_URL=$(echo "$MANIFEST" | jq -r --arg v "$MC_VERSION" '.versions[] | select(.id==$v) | .url')
          if [ -z "$VERSION_URL" ] || [ "$VERSION_URL" = "null" ]; then
            echo "ERROR: version '$MC_VERSION' not found in Mojang version manifest" && exit 1
          fi
          SERVER_URL=$(curl -fsSL "$VERSION_URL" | jq -r '.downloads.server.url')
          curl -fsSL -o vanilla.jar "$SERVER_URL"

      - name: Build and push vanilla image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          file: ./Dockerfile.vanilla
          tags: |
            ghcr.io/danielfl0/turbomc:vanilla-${{ inputs.mc_version }}
            ghcr.io/danielfl0/turbomc:vanilla-latest
