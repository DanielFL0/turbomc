name: Build and Push Docker Image

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/danielfl0/turbomc
          tags: |
            type=sha
            type=raw,value=latest

      - name: Download server JARs
        run: |
          MC_VERSION="1.21.4"
          BUILDS_JSON=$(curl -fsSL "https://api.papermc.io/v2/projects/paper/versions/${MC_VERSION}/builds")
          LATEST_BUILD=$(echo "$BUILDS_JSON" | jq -r '.builds[-1].build')
          DOWNLOAD_NAME=$(echo "$BUILDS_JSON" | jq -r '.builds[-1].downloads.application.name')
          curl -fsSL -o paper.jar \
            "https://api.papermc.io/v2/projects/paper/versions/${MC_VERSION}/builds/${LATEST_BUILD}/downloads/${DOWNLOAD_NAME}"

          mkdir -p plugins
          curl -fsSL -o plugins/Geyser-Spigot.jar \
            "https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot"
          curl -fsSL -o plugins/Floodgate-Spigot.jar \
            "https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          file: ./Dockerfile
