name: Fix Dependabot PR title

on:
  pull_request:
    types: [opened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  rename:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Fix title
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            let title = pr.title;

            // Example transform:
            // "Bump eclipse-temurin from 21 to 25-jre-jammy"
            // → "chore(deps): update eclipse-temurin to 25-jre-jammy"

            const match = title.match(/Bump (.+?) from \S+ to (.+)/i);
            if (match) {
              const pkg = match[1];
              const version = match[2];
              title = `chore(deps): update ${pkg} to ${version}`;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              title
            });